<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/app_icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" id="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Shakedown</title>
  </head>
  <body>
    <script>
      // Synchronous theme application to prevent FOUC
      (function() {
        var t = localStorage.getItem('shakedown-theme') || 'system';
        var r = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : t;
        var d = document.documentElement;
        d.classList.add(r);
        d.style.colorScheme = r;
        d.style.backgroundColor = r === 'dark' ? '#09090b' : '#f7f7f7';
        var m = document.getElementById('theme-color');
        if (m) m.setAttribute('content', r === 'dark' ? '#09090b' : '#f7f7f7');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
